<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>บันทึกรายรับรายจ่าย</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: auto; padding: 16px; }
    input, select { width: 100%; padding: 10px; margin: 6px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
    button { width: 100%; padding: 12px; background: #4CAF50; color: white;
             border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 8px; }
    #preview { max-width: 100%; margin-top: 8px; border-radius: 8px; display: none; }
    .summary { background: #f0f4ff; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
    .status { text-align: center; margin-top: 12px; font-weight: bold; color: green; }
  </style>
</head>
<body>

  <h2>💰 บันทึกรายรับรายจ่าย</h2>

  <div class="summary" id="summary">กำลังโหลดสรุป...</div>

  <select id="type">
    <option value="รายรับ">รายรับ</option>
    <option value="รายจ่าย">รายจ่าย</option>
  </select>

  <select id="category">
    <option value="อาหาร">อาหาร</option>
    <option value="เดินทาง">เดินทาง</option>
    <option value="สาธารณูปโภค">สาธารณูปโภค</option>
    <option value="เงินเดือน">เงินเดือน</option>
    <option value="อื่นๆ">อื่นๆ</option>
  </select>

  <input type="text" id="description" placeholder="รายละเอียด เช่น ค่าข้าวกลางวัน">
  <input type="number" id="amount" placeholder="จำนวนเงิน (บาท)">

  <label>📷 ถ่ายใบเสร็จ (ไม่บังคับ)</label>
  <!--
    บน GitHub Pages ไม่ถูก Google บล็อก
    กล้องเปิดได้ปกติทั้ง iOS และ Android
  -->
  <input type="file" id="cameraInput" accept="image/*" capture="environment">
  <img id="preview" alt="ตัวอย่างรูป">

  <button onclick="submitForm()">บันทึกรายการ</button>
  <p class="status" id="status"></p>

  <script>
    // ใส่ URL ของ Apps Script ที่ Deploy ไว้
    const API_URL = 'https://script.google.com/macros/s/AKfycbxHomS71-tiY1YtigJNZreeYEpoIwSpfYbK6wY-RCeQm1o2m0dBRm-3hU_mdb9NPIL44g/exec';

    // โหลดสรุปตอนเปิดหน้า
    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        document.getElementById('summary').innerHTML =
          `รายรับ: <b>${data.income.toLocaleString()} บาท</b> |
           รายจ่าย: <b>${data.expense.toLocaleString()} บาท</b> |
           คงเหลือ: <b style="color:${data.balance >= 0 ? 'green' : 'red'}">
           ${data.balance.toLocaleString()} บาท</b>`;
      });

    // แสดง preview รูปที่ถ่าย
    document.getElementById('cameraInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        const preview = document.getElementById('preview');
        preview.src = evt.target.result;
        preview.style.display = 'block';
      };
      reader.readAsDataURL(file);
    });

    async function submitForm() {
      const description = document.getElementById('description').value;
      const amount = document.getElementById('amount').value;

      if (!description || !amount) {
        alert('กรุณากรอกรายละเอียดและจำนวนเงิน');
        return;
      }

      const data = {
        type: document.getElementById('type').value,
        category: document.getElementById('category').value,
        description: description,
        amount: amount,
        imageUrl: ''
      };

      // อัปโหลดรูปถ้ามี
      const file = document.getElementById('cameraInput').files[0];
      if (file) {
        const base64 = await toBase64(file);
        // ส่ง base64 ไปให้ Apps Script อัปโหลดขึ้น Drive
        const uploadRes = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'upload', base64: base64.split(',')[1], fileName: file.name })
        });
        const uploadData = await uploadRes.json();
        data.imageUrl = uploadData.url || '';
      }

      // บันทึกรายการ
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(data)
      });
      const result = await res.json();
      document.getElementById('status').innerText = result.message;
    }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
